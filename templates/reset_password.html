<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Create New Password - UTHM Portal</title>
    <style>
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(-45deg, #1A2980, #26D0CE, #0052D4, #4364F7); background-size: 400% 400%; animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Adjusted height for password rules */
        .glass-square { width: 450px; min-height: 550px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3); padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; position: relative;}
        h1 { margin: 0; color: #1A2980; font-size: 2.2em; font-weight: 800; text-align: center;}
        p.subtitle { color: #666; margin: 10px 0 20px 0; font-size: 0.95em; line-height: 1.5; text-align: center;}
        input { width: 100%; padding: 14px; background: #f4f7f6; border: 2px solid transparent; border-radius: 12px; box-sizing: border-box; font-size: 1em; color: #333; transition: all 0.3s ease; margin-bottom: 15px;}
        input:focus { background: #fff; border: 2px solid #26D0CE; outline: none; }
        .btn { background: linear-gradient(to right, #1A2980, #26D0CE); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-top: 5px;}
        .btn:hover { transform: translateY(-3px); }
        .flash { position: absolute; top: -60px; left: 0; width: 100%; text-align: center; z-index: 10; }
        .flash span { display: inline-block; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9em; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #ffebee; color: #c62828; }

        /* PASSWORD REQUIREMENTS CSS */
        .password-reqs { margin-top: -10px; margin-bottom: 15px; padding: 10px 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .password-reqs p { margin: 0 0 5px 0; font-size: 0.85em; font-weight: bold; color: #444; }
        .req-list { list-style-type: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .req-list li { font-size: 0.8em; color: #999; transition: color 0.3s ease; display: flex; align-items: center; }
        .req-list li::before { content: '○'; margin-right: 5px; font-size: 1.2em; line-height: 1; }
        .req-list li.valid { color: #2e7d32; font-weight: bold; }
        .req-list li.valid::before { content: '●'; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="glass-square">
        <div class="flash">
            {% with messages = get_flashed_messages() %}
                {% if messages %}<span>{{ messages[0] }}</span>{% endif %}
            {% endwith %}
        </div>
        <div>
            <h1>New Password</h1>
            <p class="subtitle">Your identity has been verified. Please create a strong new password.</p>
        </div>
        
        <form action="/reset_password" method="POST" id="resetForm">
            <input type="password" id="password" name="password" required placeholder="Create new password">
            
            <div class="password-reqs">
                <p>Password Must Contain:</p>
                <ul class="req-list">
                    <li id="req-len">8+ Characters</li>
                    <li id="req-up">1 Uppercase</li>
                    <li id="req-low">1 Lowercase</li>
                    <li id="req-num">1 Number</li>
                    <li id="req-spc">1 Special Char</li>
                </ul>
            </div>

            <input type="password" name="confirm_password" required placeholder="Confirm new password">
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>

    <script>
        // Real-time Password Validation
        const pwdInput = document.getElementById('password');
        const reqs = {
            len: { el: document.getElementById('req-len'), regex: /.{8,}/ },
            up: { el: document.getElementById('req-up'), regex: /[A-Z]/ },
            low: { el: document.getElementById('req-low'), regex: /[a-z]/ },
            num: { el: document.getElementById('req-num'), regex: /[0-9]/ },
            spc: { el: document.getElementById('req-spc'), regex: /[!@#$%^&*(),.?":{}|<>]/ }
        };

        pwdInput.addEventListener('input', function() {
            const val = pwdInput.value;
            for (let key in reqs) {
                if (reqs[key].regex.test(val)) {
                    reqs[key].el.classList.add('valid');
                } else {
                    reqs[key].el.classList.remove('valid');
                }
            }
        });

        // Prevent submission if all requirements aren't met
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            const val = pwdInput.value;
            let isValid = true;
            for (let key in reqs) {
                if (!reqs[key].regex.test(val)) isValid = false;
            }
            if (!isValid) {
                e.preventDefault();
                alert('Please ensure your new password meets all security requirements.');
            }
        });
    </script>
</body>
</html>
