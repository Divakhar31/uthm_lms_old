<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Verify - UTHM Portal</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Enter Verification Code</h1>
      
      {% if error %}
      <div class="alert" style="color: red; margin-bottom: 15px;">{{ error }}</div>
      {% endif %}

      <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">
        A code has been generated for <strong>{{ session.username }}</strong>.
      </p>

      <form action="/verify" method="POST">
        <label>6-digit code</label>
        <input 
          name="code" 
          type="text" 
          inputmode="numeric" 
          pattern="[0-9]*" 
          maxlength="6" 
          placeholder="000000"
          required 
          autofocus
        >
        <button class="btn primary" type="submit">Verify & Login</button>
      </form>

      <div style="margin-top: 20px;">
        <a href="/login" style="font-size: 0.8em; color: #009dff; text-decoration: none;">&larr; Back to Login</a>
      </div>
    </div>
  </div>
</body>
</html>
