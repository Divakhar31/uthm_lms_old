<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Verify Identity - UTHM Portal</title>
    <style>
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(-45deg, #1A2980, #26D0CE, #0052D4, #4364F7); background-size: 400% 400%; animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .glass-square { width: 450px; height: 450px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3); padding: 40px; box-sizing: border-box; text-align: center; position: relative; display: flex; flex-direction: column; justify-content: center; }
        h1 { margin: 0; color: #1A2980; font-size: 2.2em; font-weight: 800; }
        p { color: #666; font-size: 0.95em; margin-bottom: 30px; margin-top: 10px; }
        input { width: 100%; padding: 14px; background: #f4f7f6; border: 2px solid transparent; border-radius: 12px; box-sizing: border-box; font-size: 1.5em; text-align: center; letter-spacing: 10px; margin-bottom: 20px; font-weight: bold;}
        input:focus { background: #fff; border: 2px solid #26D0CE; outline: none; }
        .btn { background: linear-gradient(to right, #1A2980, #26D0CE); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: transform 0.2s;}
        .btn:hover { transform: translateY(-3px); }
        .flash { position: absolute; top: -60px; left: 0; width: 100%; text-align: center; }
        .flash span { background: #ffebee; color: #c62828; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9em; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="glass-square">
        <div class="flash">
            {% with messages = get_flashed_messages() %}
                {% if messages %}<span>{{ messages[0] }}</span>{% endif %}
            {% endwith %}
        </div>

        <h1>2-Step Verification</h1>
        <p>Enter the 6-digit code from your Authenticator App to continue.</p>
        
        <form action="/verify_2fa" method="POST">
            <input type="text" name="code" placeholder="------" maxlength="6" required autocomplete="off" autofocus>
            <button type="submit" class="btn">Authenticate</button>
        </form>
        
        <a href="/" style="display: block; margin-top: 20px; color: #1A2980; text-decoration: none; font-size: 0.9em; font-weight: bold;">&larr; Cancel Login</a>
    </div>
</body>
</html>
