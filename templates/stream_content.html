{% if posts %}
    {% for post in posts %}
        <div class="post-card">
            <h4>{{ post.author_name }} posted an announcement:</h4>
            <p>{{ post.content }}</p>
            <small class="timestamp">
                Posted on: {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}
            </small>
        </div>
        <hr>
    {% endfor %}
{% else %}
    <p>No announcements or posts have been made in this classroom yet.</p>
{% endif %}
